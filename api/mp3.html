  <script>
    (async () => {
      const { FFmpeg } = FFmpegWASM;

      const ffmpeg = new FFmpeg();
  
      await ffmpeg.load({
          coreURL: "https://unpkg.com/@ffmpeg/core@0.12.10/dist/umd/ffmpeg-core.js",
          wasmURL: "https://unpkg.com/@ffmpeg/core@0.12.10/dist/umd/ffmpeg-core.wasm"
      });

      function base64ToBlob(base64String, mimeType = 'audio/mp3') {
        const byteCharacters = atob(base64String); 
        const byteNumbers = new Array(byteCharacters.length);
        
        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        
        const byteArray = new Uint8Array(byteNumbers);
        return new Blob([byteArray], { type: mimeType });
      }
      
      const urlParams = new URLSearchParams(window.location.search);
      let file = base64ToBlob(urLParams.get("file"));
      
      const data = new Uint8Array(await file.arrayBuffer());
  
      await ffmpeg.writeFile("input.aac", data);
  
      await ffmpeg.exec([
          "-i",
          "input.aac",
          "-codec:a",
          "libmp3lame",
          "-q:a",
          "2",
          "output.mp3"
      ]);
  
      const mp3 = await ffmpeg.readFile("output.mp3");
  
      const blob = new Blob([mp3], {
          type: "audio/mpeg"
      });
  
      const url = URL.createObjectURL(blob);

      let res = {
        "response": url ? 200 : 404,
        "url": url
      }
      
      document.open();
      document.write(JSON.stringify(res));
      document.close();
    });
  </script>
